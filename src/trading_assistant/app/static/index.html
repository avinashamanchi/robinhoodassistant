<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trading Assistant</title>
  <style>
    :root { --bg:#0f1216; --panel:#181d24; --line:#2a323c; --fg:#e6e9ee; --muted:#8b96a5;
            --green:#3fb27f; --red:#e0575b; --amber:#d8a657; --accent:#5aa9e6; }
    * { box-sizing:border-box; }
    body { margin:0; font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--fg); }
    header { display:flex; align-items:center; justify-content:space-between; padding:12px 20px; border-bottom:1px solid var(--line); background:var(--panel); }
    header h1 { font-size:16px; margin:0; font-weight:600; }
    header .mode { color:var(--amber); font-size:12px; margin-left:10px; }
    a { color:var(--accent); }
    button { font:inherit; border:1px solid var(--line); background:#222a33; color:var(--fg); border-radius:6px; padding:6px 12px; cursor:pointer; }
    button:hover { border-color:var(--accent); }
    button.approve { border-color:var(--green); color:var(--green); }
    button.reject { border-color:var(--red); color:var(--red); }
    button.danger { border-color:var(--red); color:var(--red); }
    main { display:grid; grid-template-columns:1fr 1fr; gap:16px; padding:16px; max-width:1100px; margin:0 auto; }
    .panel { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:14px; }
    .panel h2 { font-size:13px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin:0 0 10px; }
    .full { grid-column:1 / -1; }
    #log-box, #chat-box { height:220px; overflow-y:auto; background:#11151a; border:1px solid var(--line); border-radius:8px; padding:10px; }
    .msg { margin-bottom:8px; }
    .msg .who { color:var(--muted); font-size:11px; }
    .msg.user .who { color:var(--accent); }
    .row { display:flex; gap:8px; margin-top:10px; }
    .row input { flex:1; padding:8px 10px; background:#11151a; border:1px solid var(--line); border-radius:6px; color:var(--fg); }
    table { width:100%; border-collapse:collapse; }
    th,td { text-align:left; padding:6px 8px; border-bottom:1px solid var(--line); font-size:13px; }
    th { color:var(--muted); font-weight:500; }
    .pill { padding:2px 7px; border-radius:20px; font-size:11px; }
    .pill.proposed { background:#2a2f1c; color:var(--amber); }
    .pill.ro { background:#2a2f1c; color:var(--amber); margin-left:6px; }
    .empty { color:var(--muted); font-style:italic; padding:8px 0; }
    .tool { color:var(--muted); font-size:12px; }
    .evt-reason { color:var(--red); }
    #toast { position:fixed; right:16px; bottom:16px; max-width:380px; z-index:50; display:flex; flex-direction:column; gap:8px; }
    .toast { padding:10px 14px; border-radius:8px; border:1px solid var(--line); background:var(--panel); box-shadow:0 4px 16px rgba(0,0,0,.4); font-size:13px; }
    .toast.ok { border-color:var(--green); }
    .toast.err { border-color:var(--red); color:#ffd7d7; }
  </style>
</head>
<body>
  <header>
    <div><h1>Trading Assistant <span class="mode" id="mode">paper</span></h1></div>
    <div>
      <a href="/plans/ui" style="margin-right:12px">Plans &amp; Screener</a>
      <a href="/backtests/ui" style="margin-right:12px">Backtests</a>
      <button class="danger" onclick="panic()">Panic</button>
      <button class="danger" onclick="resetKill()">Reset kill switch</button>
    </div>
  </header>

  <main>
    <section class="panel full">
      <h2>Assistant</h2>
      <div id="chat-box"></div>
      <div class="row">
        <input id="chat-input" placeholder="e.g. Buy $50 of AAPL if it drops below 175" />
        <button onclick="send()">Send</button>
      </div>
    </section>

    <section class="panel"><h2>Pending approvals</h2><div id="pending"></div></section>
    <section class="panel"><h2>Positions</h2><div id="positions"></div></section>
    <section class="panel full">
      <h2>Combined holdings <span class="mode" id="ext-stale" style="display:none">external data stale</span></h2>
      <div id="holdings"></div>
    </section>
    <section class="panel full"><h2>Execution &amp; risk log</h2><div id="log-box"></div></section>
  </main>
  <div id="toast"></div>

  <script>
    // ── DOM-safe helpers: all dynamic values go through textContent, never HTML ──
    const $ = (id) => document.getElementById(id);
    function el(tag, text, cls) {
      const n = document.createElement(tag);
      if (cls) n.className = cls;
      if (text !== undefined && text !== null) n.textContent = String(text);
      return n;
    }
    function clear(node) { while (node.firstChild) node.removeChild(node.firstChild); }
    function cell(text) { return el("td", text); }
    function tableFrom(headers, rows) {
      const t = el("table");
      const hr = el("tr");
      headers.forEach((h) => hr.appendChild(el("th", h)));
      t.appendChild(hr);
      rows.forEach((r) => t.appendChild(r));
      return t;
    }

    // ── API token (A1): prompt once, send X-API-Key on every request ──
    function apiKey() {
      let t = localStorage.getItem("api_key");
      if (t === null) { t = window.prompt("API token (X-API-Key):") || ""; localStorage.setItem("api_key", t); }
      return t;
    }
    async function api(path, opts = {}) {
      opts.headers = Object.assign({ "X-API-Key": apiKey() }, opts.headers || {});
      const r = await fetch(path, opts);
      return r.json();
    }
    const jsonPost = (body) => ({ method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });

    // Toast feedback so actions are never silent (this is the fix for
    // "I press approve and nothing happens").
    function notify(msg, kind) {
      const box = $("toast");
      const t = el("div", msg, "toast " + (kind || ""));
      box.appendChild(t);
      setTimeout(() => t.remove(), kind === "err" ? 9000 : 5000);
    }
    // Mutating call that surfaces HTTP errors instead of swallowing them.
    async function action(path, opts = {}) {
      opts.headers = Object.assign({ "X-API-Key": apiKey() }, opts.headers || {});
      let r, data;
      try { r = await fetch(path, opts); } catch (e) { notify("Network error: " + e.message, "err"); return { ok: false }; }
      try { data = await r.json(); } catch (e) { data = {}; }
      if (r.status === 401) {
        notify("Rejected: bad/missing API token. Click to re-enter.", "err");
        localStorage.removeItem("api_key");
        return { ok: false, status: 401, data };
      }
      if (!r.ok) {
        const d = data && data.detail !== undefined ? data.detail : data;
        notify("Error " + r.status + ": " + (typeof d === "string" ? d : JSON.stringify(d)), "err");
        return { ok: false, status: r.status, data };
      }
      return { ok: true, status: r.status, data };
    }

    function chatLine(who, text, cls) {
      const d = el("div", null, "msg " + (cls || ""));
      d.appendChild(el("div", who, "who"));
      d.appendChild(el("div", text));   // textContent — literal, never parsed as HTML
      $("chat-box").appendChild(d);
      $("chat-box").scrollTop = $("chat-box").scrollHeight;
    }

    async function send() {
      const input = $("chat-input");
      const msg = input.value.trim();
      if (!msg) return;
      input.value = "";
      chatLine("you", msg, "user");
      const res = await api("/chat", jsonPost({ message: msg }));
      if (res.detail) { chatLine("system", "Error: " + JSON.stringify(res.detail)); }
      else {
        (res.tool_calls || []).forEach((t) =>
          chatLine("tool", "→ " + t.name + "(" + JSON.stringify(t.input) + ")"));
        chatLine("assistant", res.reply || "(no reply)");
      }
      refresh();
    }
    $("chat-input").addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });

    async function approve(id) {
      const r = await action("/approve/" + id, { method: "POST" });
      if (r.ok) {
        const d = r.data || {};
        if (d.status === "rejected") notify("Order " + id + " REJECTED by risk: " + ((d.risk_reasons || []).join("; ") || "see log"), "err");
        else if (d.executed) notify("Approved ✓ order " + id + " → " + d.status + (d.broker_order_id ? " (Alpaca " + d.broker_order_id.slice(0, 8) + ")" : ""), "ok");
        else notify("Order " + id + ": " + (d.status || "processed"), "ok");
      }
      refresh();
    }
    async function reject(id) { const r = await action("/reject/" + id, { method: "POST" }); if (r.ok) notify("Rejected order " + id, "ok"); refresh(); }
    async function resetKill() { const r = await action("/killswitch/reset", { method: "POST" }); if (r.ok) notify("Kill switch reset", "ok"); refresh(); }
    async function panic() {
      if (!window.confirm("PANIC: cancel all orders, disable all rules, trip all kill switches?")) return;
      const r = await action("/panic", { method: "POST" }); if (r.ok) notify("PANIC executed — everything halted", "ok"); refresh();
    }

    async function refresh() {
      const p = await api("/pending");
      const pend = $("pending"); clear(pend);
      if (p.pending && p.pending.length) {
        p.pending.forEach((o) => {
          const row = el("div", null, "row");
          row.style.justifyContent = "space-between";
          row.style.alignItems = "center";
          const left = el("div");
          left.appendChild(el("strong", o.ticker));
          left.appendChild(document.createTextNode(
            " " + o.side + " " + o.order_type + " " + (o.notional ? "$" + o.notional : o.qty + " sh") +
            (o.limit_price ? " @ " + o.limit_price : "") + " "));
          left.appendChild(el("span", "proposed", "pill proposed"));
          const btns = el("div");
          const a = el("button", "Approve", "approve"); a.addEventListener("click", () => approve(o.order_id));
          const rj = el("button", "Reject", "reject"); rj.addEventListener("click", () => reject(o.order_id));
          btns.append(a, rj);
          row.append(left, btns);
          pend.appendChild(row);
        });
      } else { pend.appendChild(el("div", "No pending proposals", "empty")); }

      const pos = await api("/positions");
      const posBox = $("positions"); clear(posBox);
      if (pos.positions && pos.positions.length) {
        const rows = pos.positions.map((x) => {
          const tr = el("tr");
          [x.ticker, x.qty, x.avg_entry_price, x.current_price, x.market_value].forEach((v) => tr.appendChild(cell(v)));
          return tr;
        });
        posBox.appendChild(tableFrom(["Ticker", "Qty", "Avg", "Last", "Value"], rows));
      } else { posBox.appendChild(el("div", "No open positions", "empty")); }

      const h = await api("/holdings");
      $("ext-stale").style.display = h.external_stale ? "inline" : "none";
      const holdBox = $("holdings"); clear(holdBox);
      const all = [...(h.alpaca || []), ...(h.external || [])];
      const totals = h.combined_by_ticker || {};
      if (all.length) {
        const rows = all.map((x) => {
          const tr = el("tr");
          tr.appendChild(cell(x.ticker));
          const src = el("td", x.source);
          if (x.read_only) src.appendChild(el("span", "read-only", "pill ro"));
          tr.appendChild(src);
          tr.appendChild(cell(x.qty));
          tr.appendChild(cell(x.market_value !== undefined ? x.market_value : x.current_value));
          tr.appendChild(cell(totals[x.ticker] !== undefined ? totals[x.ticker] : ""));
          return tr;
        });
        holdBox.appendChild(tableFrom(["Ticker", "Source", "Qty", "Value", "Combined"], rows));
      } else {
        holdBox.appendChild(el("div", h.external_available === false ? "Alpaca only — no external source enabled" : "No holdings", "empty"));
      }

      const logData = await api("/log");
      const logBox = $("log-box"); clear(logBox);
      const evts = logData.risk_events || [];
      if (evts.length) {
        evts.forEach((e) => {
          const d = el("div", null, "msg");
          d.appendChild(el("span", e.at + " · " + e.type, "who"));
          d.appendChild(el("div", e.reason, "evt-reason"));
          logBox.appendChild(d);
        });
      } else { logBox.appendChild(el("div", "No risk events yet", "empty")); }
    }

    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
