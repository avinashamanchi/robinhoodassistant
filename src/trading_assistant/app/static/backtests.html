<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Backtests — Trading Assistant</title>
  <style>
    :root { --bg:#0f1216; --panel:#181d24; --line:#2a323c; --fg:#e6e9ee; --muted:#8b96a5;
            --green:#3fb27f; --red:#e0575b; --amber:#d8a657; --accent:#5aa9e6; }
    * { box-sizing:border-box; }
    body { margin:0; font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--fg); }
    header { display:flex; align-items:center; justify-content:space-between; padding:12px 20px; border-bottom:1px solid var(--line); background:var(--panel); }
    header h1 { font-size:16px; margin:0; font-weight:600; }
    .disclaimer { background:#2a2417; color:var(--amber); text-align:center; padding:8px; font-size:13px; border-bottom:1px solid var(--line); }
    button { font:inherit; border:1px solid var(--line); background:#222a33; color:var(--fg); border-radius:6px; padding:6px 12px; cursor:pointer; }
    button:hover { border-color:var(--accent); }
    main { max-width:1150px; margin:0 auto; padding:16px; display:grid; grid-template-columns:220px 1fr; gap:16px; }
    .panel { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:14px; }
    h2 { font-size:13px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin:0 0 10px; }
    .run { padding:8px; border:1px solid var(--line); border-radius:6px; margin-bottom:6px; cursor:pointer; font-size:13px; }
    .run:hover { border-color:var(--accent); }
    table { width:100%; border-collapse:collapse; }
    th,td { text-align:right; padding:6px 8px; border-bottom:1px solid var(--line); font-size:13px; }
    th:first-child, td:first-child, th:nth-child(2), td:nth-child(2), th:nth-child(3), td:nth-child(3) { text-align:left; }
    th { color:var(--muted); font-weight:500; }
    .beat-yes { color:var(--green); } .beat-no { color:var(--red); }
    .win-holdout { color:var(--amber); font-weight:600; }
    .regime { color:var(--muted); font-size:12px; }
    .empty { color:var(--muted); font-style:italic; }
  </style>
</head>
<body>
  <header>
    <h1>Backtests</h1>
    <div><a href="/" style="color:var(--accent);margin-right:12px">← Assistant</a>
    <button onclick="run()">Run new backtest</button></div>
  </header>
  <div class="disclaimer" id="disclaimer">Simulated — past performance does not predict future results.</div>

  <main>
    <section class="panel">
      <h2>Runs</h2>
      <div id="runs"><div class="empty">none yet</div></div>
    </section>
    <section class="panel">
      <h2 id="report-title">Report</h2>
      <div id="report"><div class="empty">Run a backtest or pick one on the left.</div></div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const api = (p, o) => fetch(p, o).then(r => r.json());
    const esc = (s) => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

    async function refreshRuns() {
      const data = await api('/backtests');
      const runs = data.backtests || [];
      $('runs').innerHTML = runs.length
        ? runs.map(r => `<div class="run" onclick="showReport(${r.run_id})">#${r.run_id} · ${esc(r.label)}<br><span class="regime">${r.created_at.slice(0,16).replace('T',' ')}</span></div>`).join('')
        : '<div class="empty">none yet</div>';
    }

    async function run() {
      $('report').innerHTML = '<div class="empty">Running walk-forward…</div>';
      const res = await api('/backtests/run', {method:'POST', headers:{'Content-Type':'application/json'}, body:'{}'});
      await refreshRuns();
      showReport(res.run_id);
    }

    function metricCells(m) {
      return `<td>${m.total_return_pct.toFixed(2)}</td><td>${m.sharpe.toFixed(2)}</td>
              <td>${m.max_drawdown_pct.toFixed(2)}</td><td>${m.num_trades}</td><td>${m.exposure_pct.toFixed(0)}%</td>`;
    }

    async function showReport(id) {
      const rep = await api(`/backtests/${id}/report`);
      $('report-title').textContent = `Report #${rep.run_id} — ${rep.label}`;
      const rows = rep.rows || [];
      let html = `<table><tr><th>symbol</th><th>strategy</th><th>window</th>
        <th>ret%</th><th>B&H%</th><th>sharpe</th><th>maxDD%</th><th>trades</th><th>expo</th><th>beat</th></tr>`;
      for (const r of rows) {
        const m = r.metrics, b = r.benchmark_buy_and_hold;
        const beat = r.beat_buy_and_hold;
        const holdoutClass = r.window === 'holdout' ? 'win-holdout' : '';
        html += `<tr class="${holdoutClass}"><td>${esc(r.symbol)}</td><td>${esc(r.strategy)}</td><td>${esc(r.window)}</td>
          <td>${m.total_return_pct.toFixed(2)}</td><td>${b.total_return_pct.toFixed(2)}</td>
          <td>${m.sharpe.toFixed(2)}</td><td>${m.max_drawdown_pct.toFixed(2)}</td>
          <td>${m.num_trades}</td><td>${m.exposure_pct.toFixed(0)}%</td>
          <td class="${beat?'beat-yes':'beat-no'}">${beat?'yes':'no'}</td></tr>`;
        const reg = m.pnl_by_regime || {};
        const regStr = Object.entries(reg).map(([k,v]) => `${k}: ${v.toFixed(0)}`).join(' · ');
        if (regStr) html += `<tr><td></td><td colspan="9" class="regime">P&L by regime — ${esc(regStr)}</td></tr>`;
      }
      html += '</table>';
      $('report').innerHTML = html;
    }

    refreshRuns();
  </script>
</body>
</html>
