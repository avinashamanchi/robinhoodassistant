<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Backtests — Trading Assistant</title>
  <style>
    :root { --bg:#0f1216; --panel:#181d24; --line:#2a323c; --fg:#e6e9ee; --muted:#8b96a5;
            --green:#3fb27f; --red:#e0575b; --amber:#d8a657; --accent:#5aa9e6; }
    * { box-sizing:border-box; }
    body { margin:0; font:14px/1.5 -apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--fg); }
    header { display:flex; align-items:center; justify-content:space-between; padding:12px 20px; border-bottom:1px solid var(--line); background:var(--panel); }
    header h1 { font-size:16px; margin:0; font-weight:600; }
    a { color:var(--accent); }
    .disclaimer { background:#2a2417; color:var(--amber); text-align:center; padding:8px; font-size:13px; border-bottom:1px solid var(--line); }
    button { font:inherit; border:1px solid var(--line); background:#222a33; color:var(--fg); border-radius:6px; padding:6px 12px; cursor:pointer; }
    button:hover { border-color:var(--accent); }
    main { max-width:1150px; margin:0 auto; padding:16px; display:grid; grid-template-columns:220px 1fr; gap:16px; }
    .panel { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:14px; }
    h2 { font-size:13px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin:0 0 10px; }
    .run { padding:8px; border:1px solid var(--line); border-radius:6px; margin-bottom:6px; cursor:pointer; font-size:13px; }
    .run:hover { border-color:var(--accent); }
    table { width:100%; border-collapse:collapse; }
    th,td { text-align:right; padding:6px 8px; border-bottom:1px solid var(--line); font-size:13px; }
    th:first-child, td:first-child, th:nth-child(2), td:nth-child(2), th:nth-child(3), td:nth-child(3) { text-align:left; }
    th { color:var(--muted); font-weight:500; }
    .beat-yes { color:var(--green); } .beat-no { color:var(--red); }
    .win-holdout { color:var(--amber); font-weight:600; }
    .regime { color:var(--muted); font-size:12px; }
    .empty { color:var(--muted); font-style:italic; }
  </style>
</head>
<body>
  <header>
    <h1>Backtests</h1>
    <div><a href="/" style="margin-right:12px">← Assistant</a>
    <button onclick="run()">Run new backtest</button></div>
  </header>
  <div class="disclaimer">Simulated — past performance does not predict future results.</div>

  <main>
    <section class="panel"><h2>Runs</h2><div id="runs"><div class="empty">none yet</div></div></section>
    <section class="panel"><h2 id="report-title">Report</h2>
      <div id="report"><div class="empty">Run a backtest or pick one on the left.</div></div></section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    function el(tag, text, cls) { const n = document.createElement(tag); if (cls) n.className = cls; if (text != null) n.textContent = String(text); return n; }
    function clear(n) { while (n.firstChild) n.removeChild(n.firstChild); }
    function apiKey() { let t = localStorage.getItem("api_key"); if (t === null) { t = window.prompt("API token (X-API-Key):") || ""; localStorage.setItem("api_key", t); } return t; }
    async function api(path, opts = {}) { opts.headers = Object.assign({ "X-API-Key": apiKey() }, opts.headers || {}); return (await fetch(path, opts)).json(); }

    async function refreshRuns() {
      const data = await api("/backtests");
      const box = $("runs"); clear(box);
      const runs = data.backtests || [];
      if (!runs.length) { box.appendChild(el("div", "none yet", "empty")); return; }
      runs.forEach((r) => {
        const d = el("div", null, "run");
        d.appendChild(el("div", "#" + r.run_id + " · " + r.label));
        d.appendChild(el("span", r.created_at.slice(0, 16).replace("T", " "), "regime"));
        d.addEventListener("click", () => showReport(r.run_id));
        box.appendChild(d);
      });
    }
    async function run() {
      const box = $("report"); clear(box); box.appendChild(el("div", "Running walk-forward…", "empty"));
      const res = await api("/backtests/run", { method: "POST", headers: { "Content-Type": "application/json" }, body: "{}" });
      await refreshRuns();
      if (res.run_id) showReport(res.run_id);
      else { clear(box); box.appendChild(el("div", JSON.stringify(res.detail || res), "empty")); }
    }
    async function showReport(id) {
      const rep = await api("/backtests/" + id + "/report");
      $("report-title").textContent = "Report #" + rep.run_id + " — " + rep.label;
      const box = $("report"); clear(box);
      const t = el("table");
      const hr = el("tr");
      ["symbol","strategy","window","ret%","B&H%","sharpe","maxDD%","trades","expo","beat"].forEach((h) => hr.appendChild(el("th", h)));
      t.appendChild(hr);
      (rep.rows || []).forEach((r) => {
        const m = r.metrics, b = r.benchmark_buy_and_hold, beat = r.beat_buy_and_hold;
        const tr = el("tr", null, r.window === "holdout" ? "win-holdout" : "");
        [r.symbol, r.strategy, r.window, m.total_return_pct.toFixed(2), b.total_return_pct.toFixed(2),
         m.sharpe.toFixed(2), m.max_drawdown_pct.toFixed(2), m.num_trades, m.exposure_pct.toFixed(0) + "%"]
          .forEach((v) => tr.appendChild(el("td", v)));
        tr.appendChild(el("td", beat ? "yes" : "no", beat ? "beat-yes" : "beat-no"));
        t.appendChild(tr);
        const reg = m.pnl_by_regime || {};
        const regStr = Object.entries(reg).map(([k, v]) => k + ": " + v.toFixed(0)).join(" · ");
        if (regStr) { const rr = el("tr"); rr.appendChild(el("td", "")); const c = el("td", "P&L by regime — " + regStr, "regime"); c.colSpan = 9; rr.appendChild(c); t.appendChild(rr); }
      });
      box.appendChild(t);
    }
    refreshRuns();
  </script>
</body>
</html>
